services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Source code (enables HMR)
      - ./app/src:/app/app/src
      - ./scripts:/app/scripts
      # Persist HCAD data between runs
      - hcad-data:/app/scripts/data
      # Exclude node_modules and venv (use container's)
      - /app/app/node_modules
      - /app/scripts/venv
    environment:
      - NODE_ENV=development
      - PYTHONUNBUFFERED=1

volumes:
  hcad-data:
